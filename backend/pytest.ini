[pytest]
# Pytest configuration for Igisubizo Muhinzi backend

# Test discovery patterns
python_files = test_*.py
python_classes = Test*
python_functions = test_*

# Minimum Python version
minversion = 7.0

# Test paths
testpaths = tests

# Coverage options
addopts = 
    --cov=app
    --cov-report=html
    --cov-report=term-missing
    --cov-fail-under=70
    -v
    --tb=short

# Markers
markers =
    unit: Unit tests
    integration: Integration tests
    slow: Slow tests
    security: Security tests

# Asyncio mode
asyncio_mode = auto
